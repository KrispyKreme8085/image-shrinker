<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <div>
            <input type="file" id="aFile" name="filename" multiple>
            <input type="number" id="width" placeholder="Enter a width">
            <input type="number" placeholder="1...100" id="quality">
            <select id="imageType">
                <option value="image/png">PNG</option>
                <option value="image/jpeg">JPEG</option>
                <option value="image/webp">WebP</option>
            </select>
        </div>
        <div>
            <button id="reset">Reset</button>
        </div>
    </header>
    <section id="imageSection"></section>

    <script>
        const aFile = document.getElementById("aFile")
        const anImage = document.getElementById("anImage")
        const width = document.getElementById("width")
        const quality = document.getElementById("quality")
        const reset = document.getElementById("reset")
        const imageSection = document.getElementById("imageSection")
        const imageType = document.getElementById("imageType")


        aFile.addEventListener("change", (ev) => {
            if (ev.target.files.length > 0) {
                for (file of ev.target.files) {
                    onFileChange(file)
                }
            }
        })

        reset.addEventListener("click", resetWebsite)

        async function onFileChange(file) {
            const img = new Image()
            const objectURL = URL.createObjectURL(file)

            img.onload = async () => {
                const width2 = width.value != "" ? width.value : img.width
                const height = img.height
                console.log(width2, height);
                
                URL.revokeObjectURL(objectURL)

                const fd = new FormData()
                fd.append("image", file)
                const fetchURL = new URL("https://imageshrinker.karsonmellott.dev/api/compress")
                const searchParams = new URLSearchParams()
                searchParams.set("width", width2)
                searchParams.set("quality", quality.value)
                searchParams.set("imageType", imageType.value)
                fetchURL.search = searchParams

                const res = await fetch(fetchURL, {
                    method: "POST",
                    body: fd
                })

                if (!res.ok) {
                    alert(`Server Error: ${res.status}`)
                }
                const originalSize = res.headers.get("X-Original-Bytes")
                const compressedSize = res.headers.get("X-Compressed-Bytes")
                const contentTypeFromServer = res.headers.get("Content-Type")

                const originalSizeInMB = (originalSize / 1000000).toFixed(2)
                const compressedSizeInMB = (compressedSize / 1000000).toFixed(2)

                const ourFirstBlob = await res.blob()
                const imageURL = URL.createObjectURL(ourFirstBlob)

                const a = document.createElement("a")
                a.href = imageURL
                a.download = file.name + "-resized" + returnFileType(contentTypeFromServer)
                a.innerText = "Download " + file.name + "-resized" + returnFileType(contentTypeFromServer)

                const newSection = document.createElement("div")
                newSection.innerHTML = `
                    <img src="${imageURL}" alt="${file.name + "-resized" + returnFileType(contentTypeFromServer)}"></img>
                    <p>Original Size: ${originalSizeInMB} MB // Compressed Size: ${compressedSizeInMB} MB</p>
                `
                newSection.appendChild(a)
                imageSection.appendChild(newSection)
            }
            img.src = objectURL
        }

        function returnFileType(contentType) {
            switch(contentType) {
                case "image/jpeg":
                    return ".jpeg"
                case "image/png":
                    return ".png"
                default:
                    return ".webp"

            }
        }

        function resetWebsite() {
            width.value = ""
            quality.value = ""
            aFile.value = ""
            imageSection.innerHTML = ""
        }
    </script>
</body>
</html>
